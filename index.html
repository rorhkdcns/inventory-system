<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>재고관리</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial; background: #f5f5f5; padding: 20px; }
    .container { max-width: 100%; }
    h1 { margin-bottom: 20px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
    .tab-btn { padding: 10px 20px; background: none; border: none; cursor: pointer; border-bottom: 3px solid transparent; }
    .tab-btn.active { border-bottom-color: #0066cc; color: #0066cc; font-weight: bold; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .legend { background: white; padding: 15px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ddd; }
    
    .table-wrapper { background: white; border-radius: 8px; overflow: auto; border: 1px solid #ddd; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
    th { background: #0066cc; color: white; font-weight: bold; }
    tr:nth-child(even) { background: #f9f9f9; }
    
    .cell-content { min-height: 60px; cursor: pointer; padding: 8px; border-radius: 4px; }
    .cell-content:hover { background: #e8f4f8; }
    .item { font-size: 12px; padding: 4px; margin: 2px 0; border-left: 3px solid #ddd; border-radius: 2px; }
    
    .danger { background: #ffe6e6 !important; border-left-color: #d9534f !important; }
    .warning { background: #fff3cd !important; border-left-color: #ffc107 !important; }
    .success { background: #d4edda !important; border-left-color: #5cb85c !important; }
    .empty { color: #999; font-size: 11px; }
    
    .card { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 20px; }
    textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
    input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; }
    button { padding: 10px 20px; margin: 10px 10px 10px 0; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0052a3; }
    
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
    .modal.active { display: flex; align-items: center; justify-content: center; }
    .modal-content { background: white; padding: 30px; border-radius: 8px; max-width: 400px; width: 90%; }
    .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; }
    .modal input { margin-bottom: 10px; }
    .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
    .modal-buttons button { flex: 1; margin: 0; }
    .modal-buttons button.cancel { background: #999; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📦 재고관리</h1>
    <div id="status"></div>

    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('dashboard')">📊 현황판</button>
      <button class="tab-btn" onclick="showTab('input')">📝 입력</button>
      <button class="tab-btn" onclick="showTab('search')">🔍 검색</button>
      <button class="tab-btn" onclick="showTab('stats')">📈 통계</button>
      <button class="tab-btn" onclick="showTab('export')">💾 백업</button>
    </div>

    <div id="dashboard" class="tab-content active">
      <div class="legend">
        <span>🔴 부족 (≤20개) 🟡 적정 (21-50개) 🟢 충분 (51개+)</span>
      </div>
      <div class="table-wrapper">
        <table id="dashboard-table">
          <thead>
            <tr>
              <th style="width: 60px;">칸</th>
              <th>A열</th>
              <th>B열</th>
              <th>C열</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

    <div id="input" class="tab-content">
      <div class="card">
        <h2>카톡 메시지 입력</h2>
        <textarea id="input-text" placeholder="A-1-2에 매직1제 24개"></textarea>
        <button onclick="parseInput()">적용</button>
        <button onclick="resetData()" style="background: #999;">초기화</button>
      </div>
    </div>

    <div id="search" class="tab-content">
      <div class="card">
        <h2>상품 검색</h2>
        <input type="text" id="search-input" placeholder="상품명..." onkeyup="doSearch()">
        <div id="search-results"></div>
      </div>
    </div>

    <div id="stats" class="tab-content">
      <div id="stats-content"></div>
    </div>

    <div id="export" class="tab-content">
      <div class="card">
        <h2>데이터 관리</h2>
        <button onclick="downloadCSV()">CSV 내보내기</button>
        <button onclick="downloadJSON()">JSON 백업</button>
        <button onclick="uploadJSON()">JSON 복원</button>
        <input id="file-input" type="file" style="display:none;" onchange="loadJSON(event)">
      </div>
    </div>
  </div>

  <!-- 수정 모달 -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <div class="modal-title" id="modalTitle">상품 수정</div>
      <div id="modalItems"></div>
      <input type="text" id="newItemName" placeholder="새 상품명">
      <input type="number" id="newItemQty" placeholder="수량" min="1">
      <div class="modal-buttons">
        <button onclick="addNewItem()">상품추가</button>
        <button class="cancel" onclick="closeModal()">닫기</button>
      </div>
    </div>
  </div>

  <script>
    const data = {
      A: {1:{2:[{n:'매직1제',q:24},{n:'산화제',q:36}]},2:{1:[{n:'산화제',q:8}],2:[{n:'7/33',q:5}],3:[{n:'5/30',q:22}]},3:{2:[{n:'8/33',q:18}],3:[{n:'매직1제',q:24}]},4:{3:[{n:'10/45',q:12}]},5:{1:[{n:'8/30',q:17}],2:[{n:'3/0',q:20}],3:[{n:'산화제',q:36}]},6:{3:[{n:'산화제',q:54}]}},
      B: {1:{2:[{n:'5/45',q:19}]},2:{1:[{n:'매직1제',q:6}],2:[{n:'8/1',q:3}],3:[{n:'9/30',q:16}]},3:{1:[{n:'6/30',q:16}],2:[{n:'6/33',q:19}],3:[{n:'02/02',q:18}]},4:{1:[{n:'6/33',q:7}],2:[{n:'10/30',q:7}]},5:{1:[{n:'1/0',q:22}],2:[{n:'3/0',q:14}],3:[{n:'산화제',q:36}]},6:{3:[{n:'7/30',q:11}]}},
      C: {1:{2:[{n:'크림',q:7}]},2:{2:[{n:'크림',q:24}]},4:{1:[{n:'8/34',q:4}],2:[{n:'산화제',q:72}]},5:{1:[{n:'산화제',q:36}],2:[{n:'산화제',q:36}]},6:{1:[{n:'6/30',q:5}]}}
    };

    let inv = JSON.parse(JSON.stringify(data));
    let currentEditCell = null;

    function showTab(name) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(name).classList.add('active');
      event.target.classList.add('active');
      if (name === 'dashboard') render();
      if (name === 'stats') renderStats();
    }

    function getColor(qty) {
      if (qty <= 20) return 'danger';
      if (qty <= 50) return 'warning';
      return 'success';
    }

    function getTotalQty(items) {
      return items.reduce((s, it) => s + it.q, 0);
    }

    function render() {
      let html = '';
      const maxCan = 20;
      
      for (let can = 1; can <= maxCan; can++) {
        html += `<tr><td style="font-weight: bold; background: #f0f0f0;">칸${can}</td>`;
        
        ['A', 'B', 'C'].forEach(col => {
          html += '<td><div class="cell-content" onclick="openEditModal(\'' + col + '\',' + can + ')">';
          const cd = inv[col][can];
          
          if (cd && Object.keys(cd).length > 0) {
            for (let f = 1; f <= 3; f++) {
              if (cd[f]) {
                const total = getTotalQty(cd[f]);
                const color = getColor(total);
                cd[f].forEach(it => {
                  html += `<div class="item ${color}">층${f}: ${it.n}<br>${it.q}개</div>`;
                });
              }
            }
          } else {
            html += '<div class="empty">-</div>';
          }
          
          html += '</div></td>';
        });
        
        html += '</tr>';
      }
      
      document.getElementById('table-body').innerHTML = html;
    }

    function openEditModal(col, can) {
      currentEditCell = { col, can };
      const cd = inv[col][can];
      let itemsHtml = `<div style="margin-bottom: 20px; max-height: 200px; overflow-y: auto;"><h4>${col}열 칸${can}</h4>`;
      
      if (cd && Object.keys(cd).length > 0) {
        for (let f = 1; f <= 3; f++) {
          if (cd[f]) {
            cd[f].forEach((it, idx) => {
              itemsHtml += `<div style="padding: 8px; border: 1px solid #ddd; margin: 5px 0; display: flex; justify-content: space-between; align-items: center;">
                <div onclick="editItem('${col}',${can},${f},${idx})" style="cursor: pointer; flex: 1;">층${f}: ${it.n} (${it.q}개)</div>
                <button onclick="removeItem('${col}',${can},${f},${idx})" style="background: #dc3545; padding: 5px 10px; font-size: 11px; margin: 0;">×</button>
              </div>`;
            });
          }
        }
      } else {
        itemsHtml += '<div class="empty">상품 없음</div>';
      }
      
      itemsHtml += '</div>';
      document.getElementById('modalItems').innerHTML = itemsHtml;
      document.getElementById('modalTitle').textContent = col + '열 칸' + can;
      document.getElementById('editModal').classList.add('active');
    }

    function editItem(col, can, floor, idx) {
      const it = inv[col][can][floor][idx];
      const newName = prompt('상품명:', it.n);
      if (!newName) return;
      const newQty = parseInt(prompt('수량:', it.q));
      if (!newQty) return;
      
      it.n = newName;
      it.q = newQty;
      localStorage.setItem('inv', JSON.stringify(inv));
      openEditModal(col, can);
      render();
    }

    function removeItem(col, can, floor, idx) {
      if (!confirm('삭제?')) return;
      inv[col][can][floor].splice(idx, 1);
      if (inv[col][can][floor].length === 0) delete inv[col][can][floor];
      localStorage.setItem('inv', JSON.stringify(inv));
      openEditModal(col, can);
      render();
    }

    function addNewItem() {
      if (!currentEditCell) return;
      const name = document.getElementById('newItemName').value.trim();
      const qty = parseInt(document.getElementById('newItemQty').value);
      if (!name || !qty) return alert('입력');
      
      const col = currentEditCell.col;
      const can = currentEditCell.can;
      if (!inv[col][can][1]) inv[col][can][1] = [];
      inv[col][can][1].push({n: name, q: qty});
      localStorage.setItem('inv', JSON.stringify(inv));
      document.getElementById('newItemName').value = '';
      document.getElementById('newItemQty').value = '';
      openEditModal(col, can);
      render();
    }

    function closeModal() {
      document.getElementById('editModal').classList.remove('active');
      currentEditCell = null;
    }

    function renderStats() {
      const prod = {};
      let tot = 0;
      ['A','B','C'].forEach(col => {
        for (let c = 1; c <= 20; c++) {
          if (inv[col][c]) {
            for (let f = 1; f <= 3; f++) {
              if (inv[col][c][f]) inv[col][c][f].forEach(it => {
                prod[it.n] = (prod[it.n]||0) + it.q;
                tot += it.q;
              });
            }
          }
        }
      });
      let html = `<div class="card"><h3>전체: ${tot}개 | 종류: ${Object.keys(prod).length}</h3>`;
      Object.entries(prod).sort((a,b)=>b[1]-a[1]).forEach(([n,q]) => {
        html += `<div style="padding:10px;display:flex;justify-content:space-between;border-bottom:1px solid #ddd"><span>${n}</span><span>${q}개</span></div>`;
      });
      html += '</div>';
      document.getElementById('stats-content').innerHTML = html;
    }

    function parseInput() {
      const t = document.getElementById('input-text').value;
      if (!t) return alert('입력');
      fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:500,messages:[{role:'user',content:`JSON: {열,칸,층,상품명,수량}\n${t}`}]})}).then(r=>r.json()).then(d=>{const m=d.content[0].text.match(/\[.*\]/s);if(!m)return alert('오류');const items=JSON.parse(m[0]);items.forEach(it=>{const c=it.열.toUpperCase();if(!inv[c])inv[c]={};if(!inv[c][it.칸])inv[c][it.칸]={};if(!inv[c][it.칸][it.층])inv[c][it.칸][it.층]=[];const idx=inv[c][it.칸][it.층].findIndex(x=>x.n===it.상품명);if(idx>=0)inv[c][it.칸][it.층][idx].q=it.수량;else inv[c][it.칸][it.층].push({n:it.상품명,q:it.수량});});localStorage.setItem('inv',JSON.stringify(inv));render();alert('완료!');document.getElementById('input-text').value='';}).catch(e=>alert('에러: '+e.message));
    }

    function doSearch() {
      const q = document.getElementById('search-input').value.toLowerCase();
      let html = '';
      ['A','B','C'].forEach(col => {
        for (let c = 1; c <= 20; c++) {
          if (inv[col][c]) {
            for (let f = 1; f <= 3; f++) {
              if (inv[col][c][f]) {
                inv[col][c][f].forEach(it => {
                  if (it.n.toLowerCase().includes(q)) html += `<div class="card">${it.n}<br>${col}-${c}-${f} | ${it.q}개</div>`;
                });
              }
            }
          }
        }
      });
      document.getElementById('search-results').innerHTML = html || '<div style="color:#999">없음</div>';
    }

    function resetData() {
      if (confirm('초기화?')) {
        inv = JSON.parse(JSON.stringify(data));
        localStorage.removeItem('inv');
        render();
        alert('완료!');
      }
    }

    function downloadCSV() {
      let csv = '열,칸,층,상품명,수량\n';
      ['A','B','C'].forEach(col => {
        for (let c = 1; c <= 20; c++) {
          if (inv[col][c]) {
            for (let f = 1; f <= 3; f++) {
              if (inv[col][c][f]) inv[col][c][f].forEach(it => csv += `${col},${c},${f},${it.n},${it.q}\n`);
            }
          }
        }
      });
      const blob = new Blob([csv], {type: 'text/csv'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = '재고.csv';
      a.click();
    }

    function downloadJSON() {
      const blob = new Blob([JSON.stringify(inv,null,2)], {type: 'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = '재고.json';
      a.click();
    }

    function uploadJSON() {
      document.getElementById('file-input').click();
    }

    function loadJSON(e) {
      const f = e.target.files[0];
      if (!f) return;
      const r = new FileReader();
      r.onload = (ev) => {
        try {
          inv = JSON.parse(ev.target.result);
          localStorage.setItem('inv', JSON.stringify(inv));
          render();
          alert('복원!');
        } catch(err) {
          alert('오류!');
        }
      };
      r.readAsText(f);
    }

    const saved = localStorage.getItem('inv');
    if (saved) inv = JSON.parse(saved);
    render();
  </script>
</body>
</html>
