<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>재고관리</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial; background: #f5f5f5; padding: 20px; }
    .container { max-width: 100%; }
    h1 { margin-bottom: 20px; font-size: 32px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
    .tab-btn { padding: 12px 24px; background: none; border: none; cursor: pointer; border-bottom: 3px solid transparent; font-size: 16px; }
    .tab-btn.active { border-bottom-color: #0066cc; color: #0066cc; font-weight: bold; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .legend { background: white; padding: 15px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
    
    .table-wrapper { background: white; border-radius: 8px; overflow: auto; border: 1px solid #ddd; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; padding: 16px; text-align: center; font-size: 16px; font-weight: bold; }
    th { background: #0066cc; color: white; }
    tr:nth-child(even) { background: #f9f9f9; }
    
    .cell-editable { cursor: pointer; user-select: none; }
    .cell-editable:hover { background: #e8f4f8 !important; }
    
    .danger { background: #ffe6e6 !important; }
    .warning { background: #fff3cd !important; }
    .success { background: #d4edda !important; }
    
    .card { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 20px; }
    textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; }
    button { padding: 12px 20px; margin: 10px 10px 10px 0; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    button:hover { background: #0052a3; }
    
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
    .modal.active { display: flex; align-items: center; justify-content: center; }
    .modal-content { background: white; padding: 30px; border-radius: 8px; max-width: 500px; width: 90%; }
    .modal-title { font-size: 22px; font-weight: bold; margin-bottom: 20px; }
    .modal input, .modal select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; }
    .modal-label { font-size: 16px; font-weight: bold; margin-bottom: 8px; display: block; }
    .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
    .modal-buttons button { flex: 1; margin: 0; }
    .modal-buttons button.delete { background: #dc3545; }
    .modal-buttons button.delete:hover { background: #c82333; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📦 재고관리</h1>
    <div id="status"></div>

    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('dashboard')">📊 현황판</button>
      <button class="tab-btn" onclick="showTab('input')">📝 입력</button>
      <button class="tab-btn" onclick="showTab('search')">🔍 검색</button>
      <button class="tab-btn" onclick="showTab('stats')">📈 통계</button>
      <button class="tab-btn" onclick="showTab('export')">💾 백업</button>
    </div>

    <div id="dashboard" class="tab-content active">
      <div class="legend">
        <span>🔴 부족 (≤20개) 🟡 적정 (21-50개) 🟢 충분 (51개+)</span>
      </div>
      <div class="table-wrapper">
        <table id="dashboard-table">
          <thead>
            <tr>
              <th style="width: 80px;">칸</th>
              <th>A층</th>
              <th>A상품명</th>
              <th>A수량</th>
              <th>B층</th>
              <th>B상품명</th>
              <th>B수량</th>
              <th>C층</th>
              <th>C상품명</th>
              <th>C수량</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

    <div id="input" class="tab-content">
      <div class="card">
        <h2>카톡 메시지 입력</h2>
        <textarea id="input-text" placeholder="A-1-2에 매직1제 24개"></textarea>
        <button onclick="parseInput()">적용</button>
        <button onclick="resetData()" style="background: #999;">초기화</button>
      </div>
    </div>

    <div id="search" class="tab-content">
      <div class="card">
        <h2>상품 검색</h2>
        <input type="text" id="search-input" placeholder="상품명..." onkeyup="doSearch()">
        <div id="search-results"></div>
      </div>
    </div>

    <div id="stats" class="tab-content">
      <div id="stats-content"></div>
    </div>

    <div id="export" class="tab-content">
      <div class="card">
        <h2>데이터 관리</h2>
        <button onclick="downloadCSV()">CSV 내보내기</button>
        <button onclick="downloadJSON()">JSON 백업</button>
        <button onclick="uploadJSON()">JSON 복원</button>
        <input id="file-input" type="file" style="display:none;" onchange="loadJSON(event)">
      </div>
    </div>
  </div>

  <!-- 편집 모달 -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <div class="modal-title">상품 수정</div>
      <label class="modal-label">층</label>
      <select id="modalFloor">
        <option value="1">층 1</option>
        <option value="2">층 2</option>
        <option value="3">층 3</option>
      </select>
      <label class="modal-label">상품명</label>
      <input type="text" id="modalName" placeholder="상품명">
      <label class="modal-label">수량</label>
      <input type="number" id="modalQty" placeholder="수량" min="1">
      <div class="modal-buttons">
        <button onclick="saveItem()">저장</button>
        <button class="delete" onclick="deleteItem()">삭제</button>
        <button style="background: #999;" onclick="closeModal()">취소</button>
      </div>
    </div>
  </div>

  <script>
    const data = {
      A: {1:{2:[{n:'매직1제',q:24},{n:'산화제',q:36}]},2:{1:[{n:'산화제',q:8}],2:[{n:'7/33',q:5}],3:[{n:'5/30',q:22}]},3:{2:[{n:'8/33',q:18}],3:[{n:'매직1제',q:24}]},4:{3:[{n:'10/45',q:12}]},5:{1:[{n:'8/30',q:17}],2:[{n:'3/0',q:20}],3:[{n:'산화제',q:36}]},6:{3:[{n:'산화제',q:54}]}},
      B: {1:{2:[{n:'5/45',q:19}]},2:{1:[{n:'매직1제',q:6}],2:[{n:'8/1',q:3}],3:[{n:'9/30',q:16}]},3:{1:[{n:'6/30',q:16}],2:[{n:'6/33',q:19}],3:[{n:'02/02',q:18}]},4:{1:[{n:'6/33',q:7}],2:[{n:'10/30',q:7}]},5:{1:[{n:'1/0',q:22}],2:[{n:'3/0',q:14}],3:[{n:'산화제',q:36}]},6:{3:[{n:'7/30',q:11}]}},
      C: {1:{2:[{n:'크림',q:7}]},2:{2:[{n:'크림',q:24}]},4:{1:[{n:'8/34',q:4}],2:[{n:'산화제',q:72}]},5:{1:[{n:'산화제',q:36}],2:[{n:'산화제',q:36}]},6:{1:[{n:'6/30',q:5}]}}
    };

    let inv = JSON.parse(JSON.stringify(data));
    let editingItem = null;

    function showTab(name) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(name).classList.add('active');
      event.target.classList.add('active');
      if (name === 'dashboard') render();
      if (name === 'stats') renderStats();
    }

    function getColor(qty) {
      if (qty <= 20) return 'danger';
      if (qty <= 50) return 'warning';
      return 'success';
    }

    function openEditModal(col, can, floor, idx) {
      const item = inv[col][can][floor][idx];
      editingItem = { col, can, floor, idx };
      document.getElementById('modalFloor').value = floor;
      document.getElementById('modalName').value = item.n;
      document.getElementById('modalQty').value = item.q;
      document.getElementById('editModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('editModal').classList.remove('active');
      editingItem = null;
    }

    function saveItem() {
      if (!editingItem) return;
      const floor = parseInt(document.getElementById('modalFloor').value);
      const name = document.getElementById('modalName').value.trim();
      const qty = parseInt(document.getElementById('modalQty').value);
      
      if (!name || !qty || qty < 1) return alert('올바르게 입력해주세요');
      
      const oldFloor = editingItem.floor;
      const col = editingItem.col;
      const can = editingItem.can;
      const idx = editingItem.idx;
      
      if (floor === oldFloor) {
        // 같은 층에 수정
        inv[col][can][floor][idx] = {n: name, q: qty};
      } else {
        // 다른 층으로 이동
        inv[col][can][oldFloor].splice(idx, 1);
        if (inv[col][can][oldFloor].length === 0) delete inv[col][can][oldFloor];
        if (!inv[col][can][floor]) inv[col][can][floor] = [];
        inv[col][can][floor].push({n: name, q: qty});
      }
      
      localStorage.setItem('inv', JSON.stringify(inv));
      render();
      closeModal();
    }

    function deleteItem() {
      if (!editingItem || !confirm('삭제하시겠어요?')) return;
      const col = editingItem.col;
      const can = editingItem.can;
      const floor = editingItem.floor;
      const idx = editingItem.idx;
      
      inv[col][can][floor].splice(idx, 1);
      if (inv[col][can][floor].length === 0) delete inv[col][can][floor];
      localStorage.setItem('inv', JSON.stringify(inv));
      render();
      closeModal();
    }

    function render() {
      let html = '';
      const maxCan = 20;
      
      for (let can = 1; can <= maxCan; can++) {
        const allItems = [];
        
        ['A', 'B', 'C'].forEach(col => {
          const colItems = [];
          const cd = inv[col][can];
          
          if (cd) {
            for (let f = 1; f <= 3; f++) {
              if (cd[f]) {
                cd[f].forEach((it, idx) => {
                  colItems.push({col, f, idx, n: it.n, q: it.q});
                });
              }
            }
          }
          
          allItems.push(colItems);
        });
        
        const maxRows = Math.max(
          allItems[0].length || 0,
          allItems[1].length || 0,
          allItems[2].length || 0
        );
        
        if (maxRows === 0) {
          html += `<tr><td style="font-weight: bold; background: #f0f0f0;">칸${can}</td>`;
          html += '<td colspan="9" style="color: #999;">-</td></tr>';
        } else {
          for (let r = 0; r < maxRows; r++) {
            html += '<tr>';
            
            if (r === 0) {
              html += `<td rowspan="${maxRows}" style="font-weight: bold; background: #f0f0f0; font-size: 18px;">칸${can}</td>`;
            }
            
            for (let colIdx = 0; colIdx < 3; colIdx++) {
              if (r < allItems[colIdx].length) {
                const item = allItems[colIdx][r];
                const color = getColor(item.q);
                
                html += `<td class="cell-editable ${color}" onclick="openEditModal('${item.col}',${can},${item.f},${item.idx})" style="font-size: 16px;">층${item.f}</td>`;
                html += `<td class="cell-editable ${color}" onclick="openEditModal('${item.col}',${can},${item.f},${item.idx})" style="font-size: 16px;">${item.n}</td>`;
                html += `<td class="cell-editable ${color}" onclick="openEditModal('${item.col}',${can},${item.f},${item.idx})" style="font-size: 18px; font-weight: bold;">${item.q}개</td>`;
              } else {
                html += `<td></td><td></td><td></td>`;
              }
            }
            
            html += '</tr>';
          }
        }
      }
      
      document.getElementById('table-body').innerHTML = html;
    }

    function renderStats() {
      const prod = {};
      let tot = 0;
      ['A','B','C'].forEach(col => {
        for (let c = 1; c <= 20; c++) {
          if (inv[col][c]) {
            for (let f = 1; f <= 3; f++) {
              if (inv[col][c][f]) inv[col][c][f].forEach(it => {
                prod[it.n] = (prod[it.n]||0) + it.q;
                tot += it.q;
              });
            }
          }
        }
      });
      let html = `<div class="card"><h3 style="font-size: 20px;">전체: ${tot}개 | 종류: ${Object.keys(prod).length}</h3>`;
      Object.entries(prod).sort((a,b)=>b[1]-a[1]).forEach(([n,q]) => {
        html += `<div style="padding:15px;display:flex;justify-content:space-between;border-bottom:1px solid #ddd;font-size:16px;"><span>${n}</span><span style="font-weight: bold;">${q}개</span></div>`;
      });
      html += '</div>';
      document.getElementById('stats-content').innerHTML = html;
    }

    function parseInput() {
      const t = document.getElementById('input-text').value;
      if (!t) return alert('입력');
      fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:500,messages:[{role:'user',content:`JSON: {열,칸,층,상품명,수량}\n${t}`}]})}).then(r=>r.json()).then(d=>{const m=d.content[0].text.match(/\[.*\]/s);if(!m)return alert('오류');const items=JSON.parse(m[0]);items.forEach(it=>{const c=it.열.toUpperCase();if(!inv[c])inv[c]={};if(!inv[c][it.칸])inv[c][it.칸]={};if(!inv[c][it.칸][it.층])inv[c][it.칸][it.층]=[];const idx=inv[c][it.칸][it.층].findIndex(x=>x.n===it.상품명);if(idx>=0)inv[c][it.칸][it.층][idx].q=it.수량;else inv[c][it.칸][it.층].push({n:it.상품명,q:it.수량});});localStorage.setItem('inv',JSON.stringify(inv));render();alert('완료!');document.getElementById('input-text').value='';}).catch(e=>alert('에러: '+e.message));
    }

    function doSearch() {
      const q = document.getElementById('search-input').value.toLowerCase();
      let html = '';
      ['A','B','C'].forEach(col => {
        for (let c = 1; c <= 20; c++) {
          if (inv[col][c]) {
            for (let f = 1; f <= 3; f++) {
              if (inv[col][c][f]) {
                inv[col][c][f].forEach(it => {
                  if (it.n.toLowerCase().includes(q)) html += `<div class="card" style="font-size: 16px; cursor: pointer;" onclick="openSearch('${col}',${c},${f},'${it.n}')">${it.n}<br>${col}-${c}-${f} | ${it.q}개</div>`;
                });
              }
            }
          }
        }
      });
      document.getElementById('search-results').innerHTML = html || '<div style="color:#999; font-size: 16px;">없음</div>';
    }

    function resetData() {
      if (confirm('초기화?')) {
        inv = JSON.parse(JSON.stringify(data));
        localStorage.removeItem('inv');
        render();
        alert('완료!');
      }
    }

    function downloadCSV() {
      let csv = '열,칸,층,상품명,수량\n';
      ['A','B','C'].forEach(col => {
        for (let c = 1; c <= 20; c++) {
          if (inv[col][c]) {
            for (let f = 1; f <= 3; f++) {
              if (inv[col][c][f]) inv[col][c][f].forEach(it => csv += `${col},${c},${f},${it.n},${it.q}\n`);
            }
          }
        }
      });
      const blob = new Blob([csv], {type: 'text/csv'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = '재고.csv';
      a.click();
    }

    function downloadJSON() {
      const blob = new Blob([JSON.stringify(inv,null,2)], {type: 'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = '재고.json';
      a.click();
    }

    function uploadJSON() {
      document.getElementById('file-input').click();
    }

    function loadJSON(e) {
      const f = e.target.files[0];
      if (!f) return;
      const r = new FileReader();
      r.onload = (ev) => {
        try {
          inv = JSON.parse(ev.target.result);
          localStorage.setItem('inv', JSON.stringify(inv));
          render();
          alert('복원!');
        } catch(err) {
          alert('오류!');
        }
      };
      r.readAsText(f);
    }

    const saved = localStorage.getItem('inv');
    if (saved) inv = JSON.parse(saved);
    render();
  </script>
</body>
</html>
