<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>재고관리</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial; background: #f5f5f5; padding: 20px; }
    .container { max-width: 100%; }
    h1 { margin-bottom: 20px; font-size: 32px; }
    
    .col-tabs { display: flex; gap: 15px; margin-bottom: 30px; justify-content: center; }
    .col-tab { padding: 12px 40px; background: #000; color: #000; border: none; cursor: pointer; font-size: 18px; font-weight: bold; border-radius: 12px; min-width: 140px; transition: all 0.2s; }
    .col-tab:hover { transform: scale(1.05); }
    
    .settings-btn { padding: 12px 30px; background: #666; color: #000; border: none; cursor: pointer; font-size: 16px; font-weight: bold; border-radius: 8px; transition: all 0.2s; }
    .settings-btn:hover { background: #555; }
    
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; overflow-x: auto; }
    .tab-btn { padding: 12px 24px; background: none; border: none; cursor: pointer; border-bottom: 3px solid transparent; font-size: 16px; white-space: nowrap; color: #000; }
    .tab-btn.active { border-bottom-color: #0066cc; color: #0066cc; font-weight: bold; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .legend { background: white; padding: 15px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
    
    .main-view { display: block; }
    .main-view.hidden { display: none; }
    
    .cols-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
    
    .col-wrapper { background: white; border-radius: 8px; padding: 0; border: 2px solid #ddd; overflow: hidden; }
    .col-header { padding: 15px; background: #000; color: #fff; font-size: 20px; font-weight: bold; text-align: center; border-radius: 8px 8px 0 0; }
    
    .cans-list { display: flex; flex-direction: column; gap: 15px; padding: 20px; max-height: 80vh; overflow-y: auto; }
    
    .can-card { background: #bbb; border-radius: 12px; padding: 15px; }
    .can-label { font-size: 14px; font-weight: bold; color: #333; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #999; }
    
    .floor-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; color: #333; cursor: pointer; border-bottom: 1px solid #999; transition: all 0.2s; }
    .floor-row:last-child { border-bottom: none; }
    .floor-row:hover { background: #a9a9a9; padding: 8px 5px; }
    
    .floor-name { font-weight: 600; }
    .floor-qty { font-weight: bold; }
    
    .danger { background: #ffcccc !important; }
    .warning { background: #ffffcc !important; }
    .success { background: #ccffcc !important; }
    
    .card { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 20px; }
    textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; }
    button { padding: 12px 20px; margin: 10px 10px 10px 0; background: #0066cc; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
    button:hover { background: #0052a3; }
    button.in { background: #28a745; }
    button.in:hover { background: #218838; }
    button.out { background: #ffc107; color: #000; }
    button.out:hover { background: #e0a800; }
    
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
    .modal.active { display: flex; align-items: center; justify-content: center; }
    .modal-content { background: white; padding: 30px; border-radius: 8px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
    .modal-title { font-size: 22px; font-weight: bold; margin-bottom: 20px; }
    .modal input, .modal select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; }
    .modal-label { font-size: 16px; font-weight: bold; margin-bottom: 8px; display: block; margin-top: 15px; }
    .modal-buttons { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
    .modal-buttons button { flex: 1; margin: 0; min-width: 100px; }
    .divider { border-top: 2px solid #ddd; margin: 20px 0; }
    .log-entry { background: #f9f9f9; padding: 12px; margin: 10px 0; border-left: 4px solid #0066cc; border-radius: 4px; }
    .log-date { color: #666; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📦 재고관리</h1>

    <div class="col-tabs">
      <button class="col-tab" onclick="showSettings()">⚙️ 설정</button>
    </div>

    <div id="main-view" class="main-view">
      <div class="legend">
        <span>🔴 부족 (≤20개) 🟡 적정 (21-50개) 🟢 충분 (51개+)</span>
      </div>
      
      <div class="cols-container" id="cols-container"></div>
    </div>

    <div id="settings" class="tab-content">
      <div class="tabs">
        <button class="tab-btn active" onclick="showTab('input')">📝 입력</button>
        <button class="tab-btn" onclick="showTab('search')">🔍 검색</button>
        <button class="tab-btn" onclick="showTab('stats')">📈 통계</button>
        <button class="tab-btn" onclick="showTab('logs')">📋 로그</button>
        <button class="tab-btn" onclick="showTab('export')">💾 백업</button>
      </div>

      <div id="input" class="tab-content active">
        <div class="card">
          <h2>카톡 메시지 입력</h2>
          <textarea id="input-text" placeholder="A-1-2에 매직1제 24개"></textarea>
          <button onclick="parseInput()">적용</button>
          <button onclick="resetData()" style="background: #999;">초기화</button>
          <button onclick="backToMain()" style="background: #666;">돌아가기</button>
        </div>
      </div>

      <div id="search" class="tab-content">
        <div class="card">
          <h2>상품 검색</h2>
          <input type="text" id="search-input" placeholder="상품명..." onkeyup="doSearch()">
          <div id="search-results"></div>
        </div>
      </div>

      <div id="stats" class="tab-content">
        <div id="stats-content"></div>
      </div>

      <div id="logs" class="tab-content">
        <div class="card">
          <h2>입/출고 로그</h2>
          <div id="logs-content"></div>
        </div>
      </div>

      <div id="export" class="tab-content">
        <div class="card">
          <h2>데이터 관리</h2>
          <button onclick="downloadCSV()">CSV 내보내기</button>
          <button onclick="downloadJSON()">JSON 백업</button>
          <button onclick="uploadJSON()">JSON 복원</button>
          <input id="file-input" type="file" style="display:none;" onchange="loadJSON(event)">
          <button onclick="backToMain()" style="background: #666; margin-top: 10px;">돌아가기</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 편집 모달 -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <div class="modal-title" id="modalTitle">상품 수정</div>
      <label class="modal-label">층</label>
      <select id="modalFloor">
        <option value="1">1층</option>
        <option value="2">2층</option>
        <option value="3">3층</option>
      </select>
      <label class="modal-label">상품명</label>
      <input type="text" id="modalName" placeholder="상품명">
      <label class="modal-label">수량</label>
      <input type="number" id="modalQty" placeholder="수량" min="1">
      <div class="modal-buttons" id="editButtons">
        <button onclick="saveItem()">저장</button>
        <button class="out" onclick="outItem()">출고</button>
        <button class="in" onclick="showInModal()">입고</button>
        <button style="background: #dc3545;" onclick="deleteItem()">삭제</button>
        <button style="background: #999;" onclick="closeModal()">취소</button>
      </div>

      <div class="divider"></div>
      <h3 style="margin-bottom: 15px;">➕ 새 상품 추가</h3>
      <label class="modal-label">층</label>
      <select id="newFloor">
        <option value="1">1층</option>
        <option value="2">2층</option>
        <option value="3">3층</option>
      </select>
      <label class="modal-label">상품명</label>
      <input type="text" id="newName" placeholder="상품명">
      <label class="modal-label">수량</label>
      <input type="number" id="newQty" placeholder="수량" min="1">
      <div class="modal-buttons" id="addButtons">
        <button class="in" onclick="addNewItem('in')">입고 등록</button>
        <button style="background: #28a745;" onclick="addNewItem('normal')">등록</button>
        <button style="background: #999;" onclick="closeModal()">취소</button>
      </div>

      <div class="divider" id="inDivider" style="display:none;"></div>
      <h3 id="inTitle" style="margin-bottom: 15px; display:none;">입고 수량</h3>
      <input type="number" id="inQty" placeholder="입고 수량" min="1" style="display:none;">
      <div class="modal-buttons" id="inButtons" style="display:none;">
        <button class="in" onclick="confirmIn()">입고</button>
        <button style="background: #999;" onclick="cancelIn()">취소</button>
      </div>
    </div>
  </div>

  <script>
    const data = {
      A: {1:{2:[{n:'매직1제',q:24,d:'2024-01-01'},{n:'산화제',q:36,d:'2024-01-02'}]},2:{1:[{n:'산화제',q:8,d:'2024-01-03'}],2:[{n:'7/33',q:5,d:'2024-01-04'}],3:[{n:'5/30',q:22,d:'2024-01-05'}]},3:{2:[{n:'8/33',q:18,d:'2024-01-06'}],3:[{n:'매직1제',q:24,d:'2024-01-07'}]},4:{3:[{n:'10/45',q:12,d:'2024-01-08'}]},5:{1:[{n:'8/30',q:17,d:'2024-01-09'}],2:[{n:'3/0',q:20,d:'2024-01-10'}],3:[{n:'산화제',q:36,d:'2024-01-11'}]},6:{3:[{n:'산화제',q:54,d:'2024-01-12'}]}},
      B: {1:{2:[{n:'5/45',q:19,d:'2024-01-13'}]},2:{1:[{n:'매직1제',q:6,d:'2024-01-14'}],2:[{n:'8/1',q:3,d:'2024-01-15'}],3:[{n:'9/30',q:16,d:'2024-01-16'}]},3:{1:[{n:'6/30',q:16,d:'2024-01-17'}],2:[{n:'6/33',q:19,d:'2024-01-18'}],3:[{n:'02/02',q:18,d:'2024-01-19'}]},4:{1:[{n:'6/33',q:7,d:'2024-01-20'}],2:[{n:'10/30',q:7,d:'2024-01-21'}]},5:{1:[{n:'1/0',q:22,d:'2024-01-22'}],2:[{n:'3/0',q:14,d:'2024-01-23'}],3:[{n:'산화제',q:36,d:'2024-01-24'}]},6:{3:[{n:'7/30',q:11,d:'2024-01-25'}]}},
      C: {1:{2:[{n:'크림',q:7,d:'2024-01-26'}]},2:{2:[{n:'크림',q:24,d:'2024-01-27'}]},4:{1:[{n:'8/34',q:4,d:'2024-01-28'}],2:[{n:'산화제',q:72,d:'2024-01-29'}]},5:{1:[{n:'산화제',q:36,d:'2024-01-30'}],2:[{n:'산화제',q:36,d:'2024-01-31'}]},6:{1:[{n:'6/30',q:5,d:'2024-02-01'}]}}
    };

    let inv = JSON.parse(JSON.stringify(data));
    let logs = [];
    let editingItem = null;
    let editingCan = null;
    let isAddMode = false;
    let inMode = false;

    function showSettings() {
      document.getElementById('main-view').classList.add('hidden');
      document.getElementById('settings').classList.add('active');
    }

    function backToMain() {
      document.getElementById('main-view').classList.remove('hidden');
      document.getElementById('settings').classList.remove('active');
      render();
    }

    function showTab(name) {
      document.querySelectorAll('[id="input"], [id="search"], [id="stats"], [id="logs"], [id="export"]').forEach(el => {
        el.classList.remove('active');
      });
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(name).classList.add('active');
      event.target.classList.add('active');
      if (name === 'stats') renderStats();
      if (name === 'logs') renderLogs();
    }

    function getColor(qty) {
      if (qty <= 20) return 'danger';
      if (qty <= 50) return 'warning';
      return 'success';
    }

    function getTodayDate() {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function getAllFloors() {
      const floors = new Set();
      ['A', 'B', 'C'].forEach(col => {
        for (let can = 1; can <= 20; can++) {
          if (inv[col][can]) {
            Object.keys(inv[col][can]).forEach(f => floors.add(parseInt(f)));
          }
        }
      });
      return Array.from(floors).sort((a, b) => a - b);
    }

    function openEditModal(col, can, floor, idx) {
      inMode = false;
      isAddMode = false;
      editingItem = { col, can, floor, idx };
      editingCan = { col, can };
      const item = inv[col][can][floor][idx];
      document.getElementById('modalTitle').textContent = `${col}열 칸${can} 상품 수정`;
      document.getElementById('modalFloor').value = floor;
      document.getElementById('modalName').value = item.n;
      document.getElementById('modalQty').value = item.q;
      document.getElementById('editButtons').style.display = 'flex';
      document.getElementById('addButtons').style.display = 'none';
      document.getElementById('inDivider').style.display = 'none';
      document.getElementById('inTitle').style.display = 'none';
      document.getElementById('inQty').style.display = 'none';
      document.getElementById('inButtons').style.display = 'none';
      
      const floors = getAllFloors();
      const floorSelect = document.getElementById('modalFloor');
      floorSelect.innerHTML = '';
      floors.forEach(f => {
        const opt = document.createElement('option');
        opt.value = f;
        opt.textContent = f + '층';
        floorSelect.appendChild(opt);
      });
      floorSelect.value = floor;
      
      document.getElementById('editModal').classList.add('active');
    }

    function openAddModal(col, can) {
      inMode = false;
      isAddMode = true;
      editingItem = null;
      editingCan = { col, can };
      document.getElementById('modalTitle').textContent = `${col}열 칸${can} 상품 추가`;
      document.getElementById('newFloor').value = '1';
      document.getElementById('newName').value = '';
      document.getElementById('newQty').value = '';
      document.getElementById('editButtons').style.display = 'none';
      document.getElementById('addButtons').style.display = 'flex';
      document.getElementById('inDivider').style.display = 'none';
      document.getElementById('inTitle').style.display = 'none';
      document.getElementById('inQty').style.display = 'none';
      document.getElementById('inButtons').style.display = 'none';
      
      const floors = getAllFloors();
      const floorSelect = document.getElementById('newFloor');
      floorSelect.innerHTML = '';
      for (let i = 1; i <= Math.max(...floors, 3); i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = i + '층';
        floorSelect.appendChild(opt);
      }
      
      document.getElementById('editModal').classList.add('active');
    }

    function showInModal() {
      inMode = true;
      document.getElementById('inDivider').style.display = 'block';
      document.getElementById('inTitle').style.display = 'block';
      document.getElementById('inQty').style.display = 'block';
      document.getElementById('inQty').value = '';
      document.getElementById('inButtons').style.display = 'flex';
      document.getElementById('editButtons').style.display = 'none';
    }

    function cancelIn() {
      inMode = false;
      document.getElementById('inDivider').style.display = 'none';
      document.getElementById('inTitle').style.display = 'none';
      document.getElementById('inQty').style.display = 'none';
      document.getElementById('inButtons').style.display = 'none';
      document.getElementById('editButtons').style.display = 'flex';
    }

    function confirmIn() {
      if (!editingItem) return;
      const qty = parseInt(document.getElementById('inQty').value);
      if (!qty || qty < 1) return alert('수량을 입력해주세요');

      const col = editingItem.col;
      const can = editingItem.can;
      const floor = editingItem.floor;
      const idx = editingItem.idx;
      const today = getTodayDate();

      inv[col][can][floor][idx].q += qty;
      inv[col][can][floor][idx].d = today;
      logs.push({ type: '입고', col, can, floor, name: inv[col][can][floor][idx].n, qty, date: today });
      localStorage.setItem('inv', JSON.stringify(inv));
      localStorage.setItem('logs', JSON.stringify(logs));
      render();
      closeModal();
      alert('입고되었습니다!');
    }

    function outItem() {
      if (!editingItem) return;
      const qty = parseInt(prompt('출고 수량:'));
      if (!qty || qty < 1) return alert('수량을 입력해주세요');

      const col = editingItem.col;
      const can = editingItem.can;
      const floor = editingItem.floor;
      const idx = editingItem.idx;
      const today = getTodayDate();

      if (inv[col][can][floor][idx].q < qty) return alert('재고가 부족합니다');
      
      inv[col][can][floor][idx].q -= qty;
      logs.push({ type: '출고', col, can, floor, name: inv[col][can][floor][idx].n, qty, date: today });
      localStorage.setItem('inv', JSON.stringify(inv));
      localStorage.setItem('logs', JSON.stringify(logs));
      render();
      closeModal();
      alert('출고되었습니다!');
    }

    function closeModal() {
      document.getElementById('editModal').classList.remove('active');
      editingItem = null;
      editingCan = null;
      isAddMode = false;
      inMode = false;
    }

    function saveItem() {
      if (!editingItem) return;
      const floor = parseInt(document.getElementById('modalFloor').value);
      const name = document.getElementById('modalName').value.trim();
      const qty = parseInt(document.getElementById('modalQty').value);
      
      if (!name || !qty || qty < 1) return alert('올바르게 입력해주세요');
      
      const oldFloor = editingItem.floor;
      const col = editingItem.col;
      const can = editingItem.can;
      const idx = editingItem.idx;
      
      if (floor === oldFloor) {
        inv[col][can][floor][idx].n = name;
        inv[col][can][floor][idx].q = qty;
      } else {
        inv[col][can][oldFloor].splice(idx, 1);
        if (inv[col][can][oldFloor].length === 0) delete inv[col][can][oldFloor];
        if (!inv[col][can][floor]) inv[col][can][floor] = [];
        inv[col][can][floor].push({n: name, q: qty, d: getTodayDate()});
      }
      
      localStorage.setItem('inv', JSON.stringify(inv));
      render();
      closeModal();
    }

    function addNewItem(type) {
      if (!editingCan) return;
      const floor = parseInt(document.getElementById('newFloor').value);
      const name = document.getElementById('newName').value.trim();
      const qty = parseInt(document.getElementById('newQty').value);
      
      if (!name || !qty || qty < 1) return alert('올바르게 입력해주세요');
      
      const col = editingCan.col;
      const can = editingCan.can;
      const today = getTodayDate();
      
      if (!inv[col][can][floor]) inv[col][can][floor] = [];
      inv[col][can][floor].push({n: name, q: qty, d: today});
      
      if (type === 'in') {
        logs.push({ type: '입고', col, can, floor, name, qty, date: today });
      }
      
      localStorage.setItem('inv', JSON.stringify(inv));
      localStorage.setItem('logs', JSON.stringify(logs));
      render();
      closeModal();
    }

    function deleteItem() {
      if (!editingItem || !confirm('삭제하시겠어요?')) return;
      const col = editingItem.col;
      const can = editingItem.can;
      const floor = editingItem.floor;
      const idx = editingItem.idx;
      
      inv[col][can][floor].splice(idx, 1);
      if (inv[col][can][floor].length === 0) delete inv[col][can][floor];
      localStorage.setItem('inv', JSON.stringify(inv));
      render();
      closeModal();
    }

    function render() {
      let html = '';
      const allFloors = getAllFloors();
      const displayFloors = allFloors.length > 0 ? allFloors : [1, 2, 3];
      
      ['A', 'B', 'C'].forEach(col => {
        let colHtml = `<div class="col-wrapper"><div class="col-header">${col}열</div><div class="cans-list">`;
        
        for (let can = 1; can <= 20; can++) {
          const cd = inv[col][can];
          let hasContent = false;
          let canContentHtml = '';
          
          displayFloors.forEach(floor => {
            if (cd && cd[floor] && cd[floor].length > 0) {
              cd[floor].forEach((it, idx) => {
                const color = getColor(it.q);
                const displayName = it.d ? `${it.n} [${it.d}]` : it.n;
                canContentHtml += `<div class="floor-row ${color}" onclick="openEditModal('${col}',${can},${floor},${idx})">
                  <span class="floor-name">${displayName}</span>
                  <span class="floor-qty">${it.q}개</span>
                </div>`;
                hasContent = true;
              });
            }
          });
          
          if (!hasContent) {
            canContentHtml = `<div style="text-align: center; color: #999; padding: 10px;">-</div>`;
          }
          
          colHtml += `<div class="can-card">
            <div class="can-label">칸${can}</div>
            ${canContentHtml}
          </div>`;
        }
        
        colHtml += `</div></div>`;
        html += colHtml;
      });
      
      document.getElementById('cols-container').innerHTML = html;
    }

    function renderStats() {
      const prod = {};
      let tot = 0;
      ['A','B','C'].forEach(col => {
        for (let c = 1; c <= 20; c++) {
          if (inv[col][c]) {
            for (let f = 1; f <= 3; f++) {
              if (inv[col][c][f]) inv[col][c][f].forEach(it => {
                prod[it.n] = (prod[it.n]||0) + it.q;
                tot += it.q;
              });
            }
          }
        }
      });
      let html = `<div class="card"><h3 style="font-size: 20px;">전체: ${tot}개 | 종류: ${Object.keys(prod).length}</h3>`;
      Object.entries(prod).sort((a,b)=>b[1]-a[1]).forEach(([n,q]) => {
        html += `<div style="padding:15px;display:flex;justify-content:space-between;border-bottom:1px solid #ddd;font-size:16px;"><span>${n}</span><span style="font-weight: bold;">${q}개</span></div>`;
      });
      html += '</div>';
      document.getElementById('stats-content').innerHTML = html;
    }

    function renderLogs() {
      let html = '';
      if (logs.length === 0) {
        html = '<div style="color: #999; text-align: center; padding: 20px;">로그가 없습니다</div>';
      } else {
        [...logs].reverse().forEach(log => {
          const icon = log.type === '입고' ? '📥' : '📤';
          const color = log.type === '입고' ? '#28a745' : '#ffc107';
          html += `<div class="log-entry" style="border-left-color: ${color};">
            <div>${icon} ${log.type}: ${log.col}열 칸${log.can} - ${log.name}</div>
            <div style="font-weight: bold;">수량: ${log.qty}개</div>
            <div class="log-date">${log.date}</div>
          </div>`;
        });
      }
      document.getElementById('logs-content').innerHTML = html;
    }

    function parseInput() {
      const t = document.getElementById('input-text').value;
      if (!t) return alert('입력');
      fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:500,messages:[{role:'user',content:`JSON: {열,칸,층,상품명,수량}\n${t}`}]})}).then(r=>r.json()).then(d=>{const m=d.content[0].text.match(/\[.*\]/s);if(!m)return alert('오류');const items=JSON.parse(m[0]);items.forEach(it=>{const c=it.열.toUpperCase();if(!inv[c])inv[c]={};if(!inv[c][it.칸])inv[c][it.칸]={};if(!inv[c][it.칸][it.층])inv[c][it.칸][it.층]=[];const idx=inv[c][it.칸][it.층].findIndex(x=>x.n===it.상품명);const today=getTodayDate();if(idx>=0)inv[c][it.칸][it.층][idx].q=it.수량;else inv[c][it.칸][it.층].push({n:it.상품명,q:it.수량,d:today});logs.push({type:'입고',col:c,can:it.칸,floor:it.층,name:it.상품명,qty:it.수량,date:today});});localStorage.setItem('inv',JSON.stringify(inv));localStorage.setItem('logs',JSON.stringify(logs));render();alert('완료!');document.getElementById('input-text').value='';}).catch(e=>alert('에러: '+e.message));
    }

    function doSearch() {
      const q = document.getElementById('search-input').value.toLowerCase();
      let html = '';
      ['A','B','C'].forEach(col => {
        for (let c = 1; c <= 20; c++) {
          if (inv[col][c]) {
            for (let f = 1; f <= 3; f++) {
              if (inv[col][c][f]) {
                inv[col][c][f].forEach(it => {
                  if (it.n.toLowerCase().includes(q)) html += `<div class="card" style="font-size: 16px; cursor: pointer;">${it.n}${it.d ? ' [' + it.d + ']' : ''}<br>${col}열 칸${c} ${f}층 | ${it.q}개</div>`;
                });
              }
            }
          }
        }
      });
      document.getElementById('search-results').innerHTML = html || '<div style="color:#999; font-size: 16px;">없음</div>';
    }

    function resetData() {
      if (confirm('초기화?')) {
        inv = JSON.parse(JSON.stringify(data));
        logs = [];
        localStorage.removeItem('inv');
        localStorage.removeItem('logs');
        render();
        alert('완료!');
      }
    }

    function downloadCSV() {
      let csv = '열,칸,층,상품명,수량,입고날짜\n';
      ['A','B','C'].forEach(col => {
        for (let c = 1; c <= 20; c++) {
          if (inv[col][c]) {
            for (let f = 1; f <= 3; f++) {
              if (inv[col][c][f]) inv[col][c][f].forEach(it => csv += `${col},${c},${f},${it.n},${it.q},${it.d}\n`);
            }
          }
        }
      });
      const blob = new Blob([csv], {type: 'text/csv'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = '재고.csv';
      a.click();
    }

    function downloadJSON() {
      const blob = new Blob([JSON.stringify({inv, logs},null,2)], {type: 'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = '재고.json';
      a.click();
    }

    function uploadJSON() {
      document.getElementById('file-input').click();
    }

    function loadJSON(e) {
      const f = e.target.files[0];
      if (!f) return;
      const r = new FileReader();
      r.onload = (ev) => {
        try {
          const d = JSON.parse(ev.target.result);
          inv = d.inv;
          logs = d.logs || [];
          localStorage.setItem('inv', JSON.stringify(inv));
          localStorage.setItem('logs', JSON.stringify(logs));
          render();
          alert('복원!');
        } catch(err) {
          alert('오류!');
        }
      };
      r.readAsText(f);
    }

    const saved = localStorage.getItem('inv');
    if (saved) inv = JSON.parse(saved);
    const savedLogs = localStorage.getItem('logs');
    if (savedLogs) logs = JSON.parse(savedLogs);
    render();
  </script>
</body>
</html>
