<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>재고관리</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root { --surface-1: #f1f3f5; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial; background: #f5f5f5; padding: 20px; }
    .container { max-width: 100%; }
    h1 { margin-bottom: 20px; font-size: 32px; }

    .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .tab-btn { padding: 12px 24px; background: none; border: none; cursor: pointer; border-bottom: 3px solid transparent; font-size: 16px; white-space: nowrap; color: #000; }
    .tab-btn.active { border-bottom-color: #0066cc; color: #0066cc; font-weight: bold; }
    .panel { display: none; }
    .panel.active { display: block; }

    .cols-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; align-items: start; }
    .col-wrapper { background: white; border-radius: 8px; padding: 0; border: 2px solid #ddd; overflow: hidden; }
    .col-header { padding: 15px; background: #000; color: #fff; font-size: 22px; font-weight: bold; text-align: center; }
    .cans-list { display: flex; flex-direction: column; gap: 18px; padding: 20px; }

    .can-island { display: flex; align-items: center; gap: 12px; }
    .can-num { font-size: 22px; font-weight: bold; color: #000; min-width: 50px; text-align: center; }
    .can-box { flex: 1; min-width: 0; background: #fff; border: 2px solid #bbb; border-radius: 12px; padding: 6px 12px; }

    .floor-line { display: flex; align-items: center; padding: 13px 4px; border-bottom: 1px solid #ddd; cursor: pointer; transition: all 0.15s; border-radius: 4px; }
    .floor-line:last-child { border-bottom: none; }
    .floor-line:hover { background: #f0f0f0; }
    .fl-floor { min-width: 48px; font-weight: bold; color: #0066cc; font-size: 17px; }
    .fl-name-col { flex: 1; text-align: center; }
    .fl-name { font-weight: 600; color: #222; font-size: 17px; word-break: break-all; }
    .fl-date { font-weight: 400; color: #888; font-size: 14px; }
    .fl-exp { font-weight: 400; color: #fd7e14; font-size: 12px; margin-top: 2px; }
    .fl-qty { min-width: 55px; text-align: right; font-weight: bold; color: #e03131; font-size: 17px; }
    .fl-empty { color: #888; font-weight: 400; }

    .card { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 20px; }
    .stat-select { padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 15px; background: white; }
    .sort-dir-btn { padding: 10px 14px; min-width: 88px; border: 1px solid #ddd; border-radius: 4px; font-size: 15px; background: white; color: #0066cc; font-weight: bold; cursor: pointer; margin: 0; }
    .sort-dir-btn:hover, .sort-dir-btn:active { background: #f0f6ff; }
    .loc-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .loc-chip { display: inline-flex; align-items: center; padding: 8px 14px; border: 1px solid #ddd; border-radius: 6px; background: #f2f2f2; font-weight: 500; font-size: 15px; cursor: pointer; transition: background 0.15s; -webkit-tap-highlight-color: transparent; }
    .loc-chip:hover, .loc-chip:active { background: #e5e5e5; }
    .loc-chip .loc-col { color: #185FA5; }
    .loc-chip .loc-can { color: #3B6D11; }
    .loc-chip .loc-floor { color: #854F0B; }
    .loc-chip .loc-dash { color: #999; margin: 0 1px; }

    .stats-summary-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px 16px; background: var(--surface-1); border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; font-size: 14px; color: #333; }
    .stats-summary-count { font-weight: bold; }
    .stats-legend { display: flex; gap: 14px; flex-wrap: wrap; font-size: 13px; color: #555; }
    .legend-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

    .stock-card { display: flex; background: white; border: 0.5px solid #ccc; border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
    .stock-card-bar { width: 5px; flex-shrink: 0; }
    .stock-card-body { flex: 1; min-width: 0; padding: 14px 16px; }
    .stock-card-header { display: flex; justify-content: flex-start; align-items: baseline; gap: 8px; }
    .stock-card-name { font-size: 19px; font-weight: bold; color: #222; word-break: break-all; }
    .stock-card-qty { font-size: 19px; font-weight: bold; white-space: nowrap; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; }
    button { padding: 12px 20px; margin: 10px 10px 10px 0; background: #0066cc; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
    button:hover { background: #0052a3; }
    button.in { background: #28a745; }
    button.in:hover { background: #218838; }
    button.out { background: #ffc107; color: #000; }
    button.out:hover { background: #e0a800; }

    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
    .modal.active { display: flex; align-items: center; justify-content: center; }
    .modal-content { background: white; padding: 30px; border-radius: 8px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
    .modal-title { font-size: 22px; font-weight: bold; margin-bottom: 20px; }
    .modal input, .modal select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; }
    .modal-label { font-size: 16px; font-weight: bold; margin-bottom: 8px; display: block; margin-top: 15px; }
    .modal-buttons { display: flex; gap: 10px; margin-top: 12px; }
    .modal-buttons button { flex: 1; margin: 0; }
    .divider { border-top: 2px solid #ddd; margin: 20px 0; }
    .log-entry { background: #f9f9f9; padding: 12px; margin: 10px 0; border-left: 4px solid #0066cc; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .log-date { color: #666; font-size: 13px; }
    .log-del { background: #dc3545; padding: 8px 14px; margin: 0; flex: none; }
    .log-del:hover { background: #c82333; }

    .log-filter-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 14px; }
    .log-type-toggle { display: flex; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; }
    .log-type-btn { margin: 0; padding: 10px 16px; background: white; color: #333; border: none; border-radius: 0; font-size: 14px; cursor: pointer; }
    .log-type-btn + .log-type-btn { border-left: 1px solid #ddd; }
    .log-type-btn.active { background: #0066cc; color: white; font-weight: bold; }
    .log-range { display: flex; align-items: center; gap: 6px; }
    .log-date-input { width: auto; margin: 0; padding: 9px 10px; font-size: 14px; }
    .log-range-sep { color: #999; }
    .log-loc-col { color: #185FA5; font-weight: 500; }
    .log-loc-can { color: #3B6D11; font-weight: 500; }
    .log-loc-floor { color: #854F0B; font-weight: 500; }
    .log-item-name { font-weight: bold; color: #000; }
    .log-qty { color: #C2410C; font-weight: bold; }

    .search-result-item { background: white; padding: 16px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; font-size: 16px; line-height: 1.5; cursor: pointer; transition: background 0.15s; -webkit-tap-highlight-color: transparent; }
    .search-result-item:hover, .search-result-item:active { background: #f0f6ff; }

    /* ===== 모바일 최적화 ===== */
    @media (max-width: 768px) {
      body { padding: 12px; }
      h1 { font-size: 24px; margin-bottom: 14px; }
      .tabs { gap: 4px; margin-bottom: 14px; }
      .tab-btn { padding: 10px 14px; font-size: 14px; }
      .cols-container { grid-template-columns: 1fr; gap: 16px; }
      .col-header { font-size: 20px; padding: 13px; }
      .cans-list { gap: 14px; padding: 14px; }
      .can-num { font-size: 20px; min-width: 42px; }
      .can-box { padding: 4px 10px; }
      .floor-line { padding: 14px 4px; }
      .fl-floor { min-width: 42px; font-size: 16px; }
      .fl-name { font-size: 16px; }
      .fl-date { font-size: 13px; }
      .fl-qty { min-width: 50px; font-size: 16px; }
      .modal-content { padding: 20px; width: 94%; max-height: 92vh; }
      .modal-title { font-size: 20px; }
      button { padding: 14px 18px; }
      .modal-buttons button { padding: 14px 10px; font-size: 15px; }
      .log-entry { flex-direction: column; align-items: stretch; }
      .log-del { width: 100%; padding: 12px; }
      .log-filter-bar { gap: 8px; }
      .log-type-btn { padding: 10px 12px; font-size: 13px; }
      .log-range { width: 100%; }
      .log-date-input { flex: 1; min-width: 0; }
    }
    @media (max-width: 400px) {
      .can-island { gap: 8px; }
      .can-num { font-size: 18px; min-width: 36px; }
      .fl-floor { min-width: 38px; font-size: 15px; }
      .fl-name { font-size: 15px; }
      .fl-qty { min-width: 44px; font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📦 재고관리</h1>

    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('search', this)">🔍 검색</button>
      <button class="tab-btn" onclick="showTab('stats', this)">📈 통계</button>
      <button class="tab-btn" onclick="showTab('logs', this)">📋 로그</button>
      <button class="tab-btn" onclick="showTab('export', this)">💾 백업</button>
    </div>

    <div id="search" class="panel active">
      <div class="card">
        <h2>상품 검색</h2>
        <input type="text" id="search-input" placeholder="상품명..." onkeyup="doSearch()">
        <div id="search-results"></div>
      </div>
    </div>

    <div id="stats" class="panel">
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:10px;">
          <h2 style="margin:0;">📦 재고 통계</h2>
          <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
            <select id="stats-sort" class="stat-select" onchange="renderStats()">
              <option value="qty">수량순</option>
              <option value="name">이름순(가나다)</option>
            </select>
            <button id="stats-sort-dir" class="sort-dir-btn" onclick="toggleStatsSortDir()">↓ 내림</button>
            <button onclick="downloadInventoryExcel()" style="margin:0;">📊 재고현황 엑셀</button>
          </div>
        </div>
        <div id="stats-content"></div>
      </div>

      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:10px;">
          <h2 style="margin:0;">📅 월별 입출고 통계</h2>
          <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
            <select id="month-select" class="stat-select" onchange="renderMonthlyStats()"></select>
            <select id="monthly-sort" class="stat-select" onchange="renderMonthlyStats()">
              <option value="qty">수량순</option>
              <option value="name">이름순(가나다)</option>
            </select>
            <button id="monthly-sort-dir" class="sort-dir-btn" onclick="toggleMonthlySortDir()">↓ 내림</button>
            <button onclick="downloadMonthlyStatsExcel()" style="margin:0;">📊 월별통계 엑셀</button>
          </div>
        </div>
        <div id="monthly-stats-content"></div>
      </div>
    </div>

    <div id="logs" class="panel">
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:10px;">
          <h2 style="margin:0;">입/출고 로그</h2>
          <button onclick="downloadLogsExcel()" style="margin:0;">📊 입출고로그 엑셀</button>
        </div>

        <div class="log-filter-bar">
          <div class="log-type-toggle">
            <button class="log-type-btn active" onclick="setLogTypeFilter('all', this)">전체</button>
            <button class="log-type-btn" onclick="setLogTypeFilter('입고', this)">입고</button>
            <button class="log-type-btn" onclick="setLogTypeFilter('출고', this)">출고</button>
          </div>
          <button id="log-sort-dir" class="sort-dir-btn" onclick="toggleLogSortDir()">↓ 최신순</button>
          <div class="log-range">
            <input type="date" id="log-date-from" class="log-date-input" onchange="renderLogs()">
            <span class="log-range-sep">~</span>
            <input type="date" id="log-date-to" class="log-date-input" onchange="renderLogs()">
          </div>
        </div>

        <div id="logs-content"></div>
      </div>
    </div>

    <div id="export" class="panel">
      <div class="card">
        <h2>데이터 관리</h2>
        <button onclick="downloadCSV()">CSV 내보내기</button>
        <button onclick="downloadJSON()">JSON 백업</button>
        <button onclick="uploadJSON()">JSON 복원</button>
        <input id="file-input" type="file" style="display:none;" onchange="loadJSON(event)">
        <button onclick="resetData()" style="background: #999;">초기화</button>
        <button onclick="seedInitialData()" style="background: #28a745;">🌱 초기 데이터 넣기</button>
      </div>
    </div>

    <div class="cols-container" id="cols-container"></div>
  </div>

  <!-- 편집 모달 -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <div class="modal-title" id="modalTitle">상품 수정</div>

      <div id="editFields">
        <label class="modal-label">층</label>
        <select id="modalFloor"></select>
        <label class="modal-label">상품명</label>
        <input type="text" id="modalName" placeholder="상품명">
        <label class="modal-label">수량</label>
        <input type="number" id="modalQty" placeholder="수량" min="1">
        <label class="modal-label">입고일자</label>
        <input type="date" id="modalDate">
        <label class="modal-label">유통기한 <span style="font-weight:400; color:#888; font-size:13px;">(선택)</span></label>
        <input type="date" id="modalExpDate">
      </div>

      <div id="editButtons">
        <div class="modal-buttons">
          <button class="in" onclick="showInModal()">입고</button>
          <button class="out" onclick="outItem()">출고</button>
        </div>
        <div class="modal-buttons">
          <button onclick="saveItem()">저장</button>
          <button style="background: #dc3545;" onclick="deleteItem()">삭제</button>
        </div>
        <div class="modal-buttons">
          <button style="background: #999;" onclick="closeModal()">취소</button>
        </div>
      </div>

      <div id="addSection">
        <div class="divider"></div>
        <h3 style="margin-bottom: 15px;">➕ 새 상품 추가</h3>
        <label class="modal-label">층</label>
        <select id="newFloor"></select>
        <label class="modal-label">상품명</label>
        <input type="text" id="newName" placeholder="상품명">
        <label class="modal-label">수량</label>
        <input type="number" id="newQty" placeholder="수량" min="1">
        <label class="modal-label">입고일자 <span style="font-weight:400; color:#888; font-size:13px;">(비우면 오늘 날짜)</span></label>
        <input type="date" id="newDate">
        <label class="modal-label">유통기한 <span style="font-weight:400; color:#888; font-size:13px;">(선택)</span></label>
        <input type="date" id="newExpDate">
        <div class="modal-buttons">
          <button class="in" onclick="addNewItem('in')">입고 등록</button>
          <button style="background: #28a745;" onclick="addNewItem('normal')">등록</button>
        </div>
        <div class="modal-buttons">
          <button style="background: #999;" onclick="closeModal()">취소</button>
        </div>
      </div>

      <div id="inSection" style="display:none;">
        <h3 style="margin-bottom: 15px;">입고 수량</h3>
        <input type="number" id="inQty" placeholder="입고 수량" min="1">
        <label class="modal-label">입고일자 <span style="font-weight:400; color:#888; font-size:13px;">(비우면 오늘 날짜)</span></label>
        <input type="date" id="inDate">
        <label class="modal-label">유통기한 <span style="font-weight:400; color:#888; font-size:13px;">(선택, 비우면 기존 값 유지)</span></label>
        <input type="date" id="inExpDate">
        <div class="modal-buttons">
          <button class="in" onclick="confirmIn()">입고</button>
          <button style="background: #999;" onclick="cancelIn()">취소</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const COL_MAX = { A: 6, B: 6, C: 20 };

    // Supabase 초기화
    const SUPABASE_URL = 'https://ibdklbgmkiymqqscpoeu.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImliZGtsYmdta2l5bXFxc2Nwb2V1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMzU3MTEsImV4cCI6MjA5NzkxMTcxMX0.oQxJj_wsUAYaEIs4G0xzPszBiv8mplU-vea_Nnq9r1Q';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 디버깅용: Supabase 호출 결과를 콘솔에 출력 (F12 > Console 탭에서 확인)
    function logSb(op, table, error, payload) {
      if (error) {
        console.error(`[Supabase] ${table} ${op} 실패`, error, payload !== undefined ? { payload } : '');
      } else {
        console.log(`[Supabase] ${table} ${op} 성공`, payload !== undefined ? payload : '');
      }
    }

    // 초기 데이터 (seedInitialData / resetData 에서만 사용)
    const initialData = {
      A: {1:{2:[{n:'매직1제',q:24,d:'2024-01-01'},{n:'산화제',q:36,d:'2024-01-02'}]},2:{1:[{n:'산화제',q:8,d:'2024-01-03'}],2:[{n:'7/33',q:5,d:'2024-01-04'}],3:[{n:'5/30',q:22,d:'2024-01-05'}]},3:{2:[{n:'8/33',q:18,d:'2024-01-06'}],3:[{n:'매직1제',q:24,d:'2024-01-07'}]},4:{3:[{n:'10/45',q:12,d:'2024-01-08'}]},5:{1:[{n:'8/30',q:17,d:'2024-01-09'}],2:[{n:'3/0',q:20,d:'2024-01-10'}],3:[{n:'산화제',q:36,d:'2024-01-11'}]},6:{3:[{n:'산화제',q:54,d:'2024-01-12'}]}},
      B: {1:{2:[{n:'5/45',q:19,d:'2024-01-13'}]},2:{1:[{n:'매직1제',q:6,d:'2024-01-14'}],2:[{n:'8/1',q:3,d:'2024-01-15'}],3:[{n:'9/30',q:16,d:'2024-01-16'}]},3:{1:[{n:'6/30',q:16,d:'2024-01-17'}],2:[{n:'6/33',q:19,d:'2024-01-18'}],3:[{n:'02/02',q:18,d:'2024-01-19'}]},4:{1:[{n:'6/33',q:7,d:'2024-01-20'}],2:[{n:'10/30',q:7,d:'2024-01-21'}]},5:{1:[{n:'1/0',q:22,d:'2024-01-22'}],2:[{n:'3/0',q:14,d:'2024-01-23'}],3:[{n:'산화제',q:36,d:'2024-01-24'}]},6:{3:[{n:'7/30',q:11,d:'2024-01-25'}]}},
      C: {1:{2:[{n:'크림',q:7,d:'2024-01-26'}]},2:{2:[{n:'크림',q:24,d:'2024-01-27'}]},4:{1:[{n:'8/34',q:4,d:'2024-01-28'}],2:[{n:'산화제',q:72,d:'2024-01-29'}]},5:{1:[{n:'산화제',q:36,d:'2024-01-30'}],2:[{n:'산화제',q:36,d:'2024-01-31'}]},6:{1:[{n:'6/30',q:5,d:'2024-02-01'}]}}
    };

    let inv = { A: {}, B: {}, C: {} };
    let logs = [];
    let editingItem = null;
    let editingCan = null;
    let statsSortDir = 'desc';
    let monthlySortDir = 'desc';
    let logTypeFilter = 'all';
    let logSortDir = 'desc';

    function toggleStatsSortDir() {
      statsSortDir = statsSortDir === 'desc' ? 'asc' : 'desc';
      renderStats();
    }

    function toggleMonthlySortDir() {
      monthlySortDir = monthlySortDir === 'desc' ? 'asc' : 'desc';
      renderMonthlyStats();
    }

    function flattenInitialData() {
      const rows = [];
      Object.entries(initialData).forEach(([col, cans]) => {
        Object.entries(cans).forEach(([can, floors]) => {
          Object.entries(floors).forEach(([floor, items]) => {
            items.forEach(it => rows.push({ col, can: parseInt(can), floor: parseInt(floor), name: it.n, qty: it.q, in_date: it.d }));
          });
        });
      });
      return rows;
    }

    async function loadInventory() {
      console.log('[Supabase] inventory_items select 요청 중...');
      const { data: rows, error } = await sb.from('inventory_items').select('*');
      logSb('select', 'inventory_items', error, rows);
      if (error) { alert('재고 불러오기 오류: ' + error.message); return; }
      const next = { A: {}, B: {}, C: {} };
      rows.forEach(row => {
        const { id, col, can, floor, name, qty, in_date, exp_date } = row;
        if (!next[col]) next[col] = {};
        if (!next[col][can]) next[col][can] = {};
        if (!next[col][can][floor]) next[col][can][floor] = [];
        next[col][can][floor].push({ id, n: name, q: qty, d: in_date, e: exp_date });
      });
      inv = next;
    }

    async function loadLogs() {
      console.log('[Supabase] inventory_logs select 요청 중...');
      const { data: rows, error } = await sb.from('inventory_logs').select('*').order('id', { ascending: true });
      logSb('select', 'inventory_logs', error, rows);
      if (error) { alert('로그 불러오기 오류: ' + error.message); return; }
      logs = rows.map(r => ({ id: r.id, type: r.type, col: r.col, can: r.can, floor: r.floor, name: r.name, qty: r.qty, date: r.date }));
    }

    function subscribeRealtime() {
      sb.channel('inventory-items-changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'inventory_items' }, async (payload) => {
          console.log('[Realtime] inventory_items 변경 감지:', payload);
          await loadInventory();
          render();
        })
        .subscribe((status) => console.log('[Realtime] inventory_items 채널 상태:', status));

      sb.channel('inventory-logs-changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'inventory_logs' }, async (payload) => {
          console.log('[Realtime] inventory_logs 변경 감지:', payload);
          await loadLogs();
          renderLogs();
        })
        .subscribe((status) => console.log('[Realtime] inventory_logs 채널 상태:', status));
    }

    function showTab(name, btn) {
      document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(name).classList.add('active');
      btn.classList.add('active');
      if (name === 'stats') { renderStats(); renderMonthlyStats(); }
      if (name === 'logs') renderLogs();
    }

    function getTodayDate() {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function getAllFloors() {
      const floors = new Set();
      ['A', 'B', 'C'].forEach(col => {
        for (let can = 1; can <= 20; can++) {
          if (inv[col][can]) {
            Object.keys(inv[col][can]).forEach(f => floors.add(parseInt(f)));
          }
        }
      });
      return Array.from(floors).sort((a, b) => a - b);
    }

    function setEditMode() {
      document.getElementById('editFields').style.display = 'block';
      document.getElementById('editButtons').style.display = 'block';
      document.getElementById('addSection').style.display = 'block';
      document.getElementById('inSection').style.display = 'none';
    }

    function openEditModal(col, can, floor, idx) {
      const item = inv[col][can][floor][idx];
      editingItem = { col, can, floor, idx, id: item.id };
      editingCan = { col, can };
      document.getElementById('modalTitle').textContent = `${col}열 칸${can} 상품 수정`;
      document.getElementById('modalName').value = item.n;
      document.getElementById('modalQty').value = item.q;
      document.getElementById('modalDate').value = item.d || getTodayDate();
      document.getElementById('modalExpDate').value = item.e || '';
      setEditMode();

      const floors = getAllFloors();
      const maxF = Math.max(...floors, 3, floor);
      const fs = document.getElementById('modalFloor');
      fs.innerHTML = '';
      for (let i = 1; i <= maxF; i++) {
        const o = document.createElement('option'); o.value = i; o.textContent = i + '층'; fs.appendChild(o);
      }
      fs.value = floor;

      const nfs = document.getElementById('newFloor');
      nfs.innerHTML = '';
      for (let i = 1; i <= Math.max(...floors, 3); i++) {
        const o = document.createElement('option'); o.value = i; o.textContent = i + '층'; nfs.appendChild(o);
      }
      document.getElementById('newName').value = '';
      document.getElementById('newQty').value = '';
      document.getElementById('newDate').value = '';
      document.getElementById('newExpDate').value = '';

      document.getElementById('editModal').classList.add('active');
    }

    function openAddModal(col, can) {
      editingItem = null;
      editingCan = { col, can };
      document.getElementById('modalTitle').textContent = `${col}열 칸${can} 상품 추가`;
      document.getElementById('editFields').style.display = 'none';
      document.getElementById('editButtons').style.display = 'none';
      document.getElementById('addSection').style.display = 'block';
      document.getElementById('inSection').style.display = 'none';

      const floors = getAllFloors();
      const nfs = document.getElementById('newFloor');
      nfs.innerHTML = '';
      for (let i = 1; i <= Math.max(...floors, 3); i++) {
        const o = document.createElement('option'); o.value = i; o.textContent = i + '층'; nfs.appendChild(o);
      }
      document.getElementById('newName').value = '';
      document.getElementById('newQty').value = '';
      document.getElementById('newDate').value = '';
      document.getElementById('newExpDate').value = '';
      document.getElementById('editModal').classList.add('active');
    }

    function openAddModalFloor(col, can, floor) {
      openAddModal(col, can);
      document.getElementById('newFloor').value = floor;
    }

    function showInModal() {
      document.getElementById('editFields').style.display = 'none';
      document.getElementById('editButtons').style.display = 'none';
      document.getElementById('addSection').style.display = 'none';
      document.getElementById('inSection').style.display = 'block';
      document.getElementById('inQty').value = '';
      document.getElementById('inDate').value = '';
      document.getElementById('inExpDate').value = '';
    }

    function cancelIn() {
      setEditMode();
    }

    async function confirmIn() {
      if (!editingItem) return;
      const qty = parseInt(document.getElementById('inQty').value);
      if (!qty || qty < 1) return alert('수량을 입력해주세요');
      const { col, can, floor, idx, id } = editingItem;
      const date = document.getElementById('inDate').value || getTodayDate();
      const expDate = document.getElementById('inExpDate').value;
      const item = inv[col][can][floor][idx];
      const newQty = item.q + qty;

      const updatePayload = { qty: newQty, in_date: date };
      if (expDate) updatePayload.exp_date = expDate;
      const { error: updErr } = await sb.from('inventory_items').update(updatePayload).eq('id', id);
      logSb('update', 'inventory_items', updErr, { id, ...updatePayload });
      if (updErr) { console.error('[Supabase] 입고 실패:', updErr); return alert('입고 오류: ' + updErr.message); }

      const logPayload = { type: '입고', col, can, floor, name: item.n, qty, date };
      const { error: logErr } = await sb.from('inventory_logs').insert(logPayload);
      logSb('insert', 'inventory_logs', logErr, logPayload);
      if (logErr) { console.error('[Supabase] 입고 로그 저장 실패:', logErr); return alert('로그 저장 오류: ' + logErr.message); }

      await loadInventory();
      await loadLogs();
      render();
      closeModal();
      alert('입고되었습니다!');
    }

    async function outItem() {
      if (!editingItem) return;
      const qty = parseInt(prompt('출고 수량:'));
      if (!qty || qty < 1) return alert('수량을 입력해주세요');
      const { col, can, floor, idx, id } = editingItem;
      const today = getTodayDate();
      const item = inv[col][can][floor][idx];
      if (item.q < qty) return alert('재고가 부족합니다');
      const newQty = item.q - qty;

      const { error: updErr } = await sb.from('inventory_items').update({ qty: newQty }).eq('id', id);
      logSb('update', 'inventory_items', updErr, { id, qty: newQty });
      if (updErr) { console.error('[Supabase] 출고 실패:', updErr); return alert('출고 오류: ' + updErr.message); }

      const logPayload = { type: '출고', col, can, floor, name: item.n, qty, date: today };
      const { error: logErr } = await sb.from('inventory_logs').insert(logPayload);
      logSb('insert', 'inventory_logs', logErr, logPayload);
      if (logErr) { console.error('[Supabase] 출고 로그 저장 실패:', logErr); return alert('로그 저장 오류: ' + logErr.message); }

      await loadInventory();
      await loadLogs();
      render();
      closeModal();
      alert('출고되었습니다!');
    }

    function closeModal() {
      document.getElementById('editModal').classList.remove('active');
      editingItem = null;
      editingCan = null;
    }

    async function saveItem() {
      if (!editingItem) return;
      const floor = parseInt(document.getElementById('modalFloor').value);
      const name = document.getElementById('modalName').value.trim();
      const qty = parseInt(document.getElementById('modalQty').value);
      const date = document.getElementById('modalDate').value || getTodayDate();
      const expDate = document.getElementById('modalExpDate').value || null;
      if (!name || !qty || qty < 1) return alert('올바르게 입력해주세요');
      const { id } = editingItem;

      const updatePayload = { floor, name, qty, in_date: date, exp_date: expDate };
      const { error } = await sb.from('inventory_items').update(updatePayload).eq('id', id);
      logSb('update', 'inventory_items', error, { id, ...updatePayload });
      if (error) { console.error('[Supabase] 상품 수정 실패:', error); return alert('저장 오류: ' + error.message); }

      await loadInventory();
      render();
      closeModal();
    }

    async function addNewItem(type) {
      if (!editingCan) return;
      const floor = parseInt(document.getElementById('newFloor').value);
      const name = document.getElementById('newName').value.trim();
      const qty = parseInt(document.getElementById('newQty').value);
      const date = document.getElementById('newDate').value || getTodayDate();
      const expDate = document.getElementById('newExpDate').value || null;
      if (!name || !qty || qty < 1) return alert('올바르게 입력해주세요');
      const { col, can } = editingCan;

      const insertPayload = { col, can, floor, name, qty, in_date: date, exp_date: expDate };
      const { error } = await sb.from('inventory_items').insert(insertPayload);
      logSb('insert', 'inventory_items', error, insertPayload);
      if (error) { console.error('[Supabase] 상품 추가 실패:', error); return alert('추가 오류: ' + error.message); }

      if (type === 'in') {
        const logPayload = { type: '입고', col, can, floor, name, qty, date };
        const { error: logErr } = await sb.from('inventory_logs').insert(logPayload);
        logSb('insert', 'inventory_logs', logErr, logPayload);
        if (logErr) { console.error('[Supabase] 입고 로그 저장 실패:', logErr); return alert('로그 저장 오류: ' + logErr.message); }
        await loadLogs();
      }

      await loadInventory();
      render();
      closeModal();
    }

    async function deleteItem() {
      if (!editingItem || !confirm('삭제하시겠어요?')) return;
      const { error } = await sb.from('inventory_items').delete().eq('id', editingItem.id);
      logSb('delete', 'inventory_items', error, { id: editingItem.id });
      if (error) { console.error('[Supabase] 상품 삭제 실패:', error); return alert('삭제 오류: ' + error.message); }
      await loadInventory();
      render();
      closeModal();
    }

    const FLOOR_COLORS = ['#7F77DD', '#1D9E75', '#D4537E'];
    function getFloorColor(floor) {
      return FLOOR_COLORS[(floor - 1) % FLOOR_COLORS.length];
    }

    function render() {
      let html = '';
      const allFloors = getAllFloors();
      const displayFloors = allFloors.length > 0 ? allFloors : [1, 2, 3];

      ['A', 'B', 'C'].forEach(col => {
        let colHtml = `<div class="col-wrapper"><div class="col-header">${col}열</div><div class="cans-list">`;
        const maxCan = COL_MAX[col];
        for (let can = 1; can <= maxCan; can++) {
          const cd = inv[col][can];
          let rowsHtml = '';
          displayFloors.forEach(floor => {
            if (cd && cd[floor] && cd[floor].length > 0) {
              cd[floor].forEach((it, idx) => {
                const dateHtml = it.d ? ` <span class="fl-date">[${it.d}]</span>` : '';
                const expHtml = it.e ? `<div class="fl-exp">유통기한: ${it.e}</div>` : '';
                rowsHtml += `<div class="floor-line" onclick="openEditModal('${col}',${can},${floor},${idx})">
                  <span class="fl-floor" style="color:${getFloorColor(floor)};">${floor}층</span>
                  <div class="fl-name-col">
                    <span class="fl-name">${it.n}${dateHtml}</span>
                    ${expHtml}
                  </div>
                  <span class="fl-qty">${it.q}개</span>
                </div>`;
              });
            } else {
              rowsHtml += `<div class="floor-line" onclick="openAddModalFloor('${col}',${can},${floor})">
                <span class="fl-floor" style="color:${getFloorColor(floor)};">${floor}층</span>
                <div class="fl-name-col"><span class="fl-name fl-empty">+ 추가</span></div>
                <span class="fl-qty fl-empty">-</span>
              </div>`;
            }
          });
          colHtml += `<div class="can-island"><div class="can-num">${can}칸</div><div class="can-box">${rowsHtml}</div></div>`;
        }
        colHtml += `</div></div>`;
        html += colHtml;
      });

      document.getElementById('cols-container').innerHTML = html;
    }

    function getProductTotals() {
      const prod = {};
      let tot = 0;
      ['A','B','C'].forEach(col => {
        for (let c = 1; c <= 20; c++) {
          if (inv[col][c]) {
            for (let f = 1; f <= 10; f++) {
              if (inv[col][c][f]) {
                inv[col][c][f].forEach((it, idx) => {
                  if (!prod[it.n]) prod[it.n] = { qty: 0, locations: [] };
                  prod[it.n].qty += it.q;
                  prod[it.n].locations.push({ col, can: c, floor: f, idx });
                  tot += it.q;
                });
              }
            }
          }
        }
      });
      return { prod, tot };
    }

    function sortEntries(entries, sortMode, dir, valueOf) {
      const sorted = entries.slice();
      const mult = dir === 'asc' ? 1 : -1;
      if (sortMode === 'name') sorted.sort((a, b) => mult * a[0].localeCompare(b[0], 'ko'));
      else sorted.sort((a, b) => mult * (valueOf(a[1]) - valueOf(b[1])));
      return sorted;
    }

    function updateSortDirLabel(btnId, dir) {
      document.getElementById(btnId).textContent = dir === 'desc' ? '↓ 내림' : '↑ 오름';
    }

    function getStockStatus(qty) {
      if (qty <= 10) return { color: '#E24B4A' };
      if (qty <= 50) return { color: '#639922' };
      return { color: '#378ADD' };
    }

    function renderStats() {
      const { prod, tot } = getProductTotals();
      const sortMode = document.getElementById('stats-sort').value;
      updateSortDirLabel('stats-sort-dir', statsSortDir);
      const entries = sortEntries(Object.entries(prod), sortMode, statsSortDir, data => data.qty);

      let html = `<div class="stats-summary-bar">
        <div class="stats-summary-count">전체 ${tot.toLocaleString()}개 · 종류 ${Object.keys(prod).length.toLocaleString()}</div>
        <div class="stats-legend">
          <span><span class="legend-dot" style="background:#E24B4A;"></span>부족 10개↓</span>
          <span><span class="legend-dot" style="background:#639922;"></span>적정 11~50</span>
          <span><span class="legend-dot" style="background:#378ADD;"></span>여유 51개↑</span>
        </div>
      </div>`;

      entries.forEach(([n, data]) => {
        const { color } = getStockStatus(data.qty);
        const chipsHtml = data.locations.map(loc => `<button class="loc-chip" onclick="openEditModal('${loc.col}',${loc.can},${loc.floor},${loc.idx})">
          <span class="loc-col">${loc.col}</span><span class="loc-dash">·</span><span class="loc-can">${loc.can}</span><span class="loc-dash">·</span><span class="loc-floor">${loc.floor}</span>
        </button>`).join('');
        html += `<div class="stock-card">
          <div class="stock-card-bar" style="background:${color};"></div>
          <div class="stock-card-body">
            <div class="stock-card-header">
              <span class="stock-card-name">${n}</span>
              <span class="stock-card-qty" style="color:${color};">${data.qty}개</span>
            </div>
            <div class="loc-chips">${chipsHtml}</div>
          </div>
        </div>`;
      });
      document.getElementById('stats-content').innerHTML = html;
    }

    function getAvailableMonths() {
      const months = new Set();
      logs.forEach(l => { if (l.date) months.add(l.date.slice(0, 7)); });
      return Array.from(months).sort();
    }

    function getSelectedMonth() {
      const sel = document.getElementById('month-select');
      if (sel && sel.value) return sel.value;
      const months = getAvailableMonths();
      return months.length ? months[months.length - 1] : getTodayDate().slice(0, 7);
    }

    function getMonthlyProductStats(month) {
      const prod = {};
      logs.forEach(l => {
        if (!l.date || l.date.slice(0, 7) !== month) return;
        if (!prod[l.name]) prod[l.name] = { in: 0, out: 0 };
        if (l.type === '입고') prod[l.name].in += l.qty;
        else prod[l.name].out += l.qty;
      });
      return prod;
    }

    function renderMonthlyStats() {
      const months = getAvailableMonths();
      const sel = document.getElementById('month-select');
      const keep = sel.value;
      sel.innerHTML = months.length
        ? months.map(m => `<option value="${m}">${m}</option>`).join('')
        : '<option value="">데이터 없음</option>';
      sel.value = months.includes(keep) ? keep : (months[months.length - 1] || '');

      const month = sel.value;
      const sortMode = document.getElementById('monthly-sort').value;
      updateSortDirLabel('monthly-sort-dir', monthlySortDir);
      const prod = getMonthlyProductStats(month);
      const entries = sortEntries(Object.entries(prod), sortMode, monthlySortDir, v => v.in + v.out);

      let html = '';
      if (!month || entries.length === 0) {
        html = '<div style="color:#999; text-align:center; padding:20px;">해당 월의 입출고 기록이 없습니다</div>';
      } else {
        entries.forEach(([name, v]) => {
          html += `<div style="padding:15px;display:flex;justify-content:space-between;border-bottom:1px solid #ddd;font-size:16px;">
            <span>${name}</span>
            <span><span style="color:#28a745;font-weight:bold;">입고 ${v.in}</span> / <span style="color:#e8590c;font-weight:bold;">출고 ${v.out}</span></span>
          </div>`;
        });
      }
      document.getElementById('monthly-stats-content').innerHTML = html;
    }

    function setLogTypeFilter(type, btn) {
      logTypeFilter = type;
      document.querySelectorAll('.log-type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderLogs();
    }

    function toggleLogSortDir() {
      logSortDir = logSortDir === 'desc' ? 'asc' : 'desc';
      renderLogs();
    }

    function updateLogSortDirLabel() {
      document.getElementById('log-sort-dir').textContent = logSortDir === 'desc' ? '↓ 최신순' : '↑ 오래된순';
    }

    function getFilteredSortedLogs() {
      const from = document.getElementById('log-date-from').value;
      const to = document.getElementById('log-date-to').value;
      const filtered = logs.filter(l => {
        if (logTypeFilter !== 'all' && l.type !== logTypeFilter) return false;
        if (from && (!l.date || l.date < from)) return false;
        if (to && (!l.date || l.date > to)) return false;
        return true;
      });
      const mult = logSortDir === 'asc' ? 1 : -1;
      filtered.sort((a, b) => mult * ((a.date || '').localeCompare(b.date || '')) || mult * (a.id - b.id));
      return filtered;
    }

    function renderLogs() {
      updateLogSortDirLabel();
      const filtered = getFilteredSortedLogs();
      let html = '';
      if (logs.length === 0) {
        html = '<div style="color: #999; text-align: center; padding: 20px;">로그가 없습니다</div>';
      } else {
        html += `<button onclick="clearLogs()" style="background:#dc3545; margin-bottom:15px;">전체 삭제</button>`;
        if (filtered.length === 0) {
          html += '<div style="color: #999; text-align: center; padding: 20px;">조건에 맞는 로그가 없습니다</div>';
        } else {
          filtered.forEach(log => {
            const icon = log.type === '입고' ? '📥' : '📤';
            const color = log.type === '입고' ? '#28a745' : '#ffc107';
            html += `<div class="log-entry" style="border-left-color: ${color};">
              <div>
                <div>${icon} ${log.type}: <span class="log-loc-col">${log.col}</span>열 <span class="log-loc-can">${log.can}</span>칸 <span class="log-loc-floor">${log.floor}</span>층 - <span class="log-item-name">${log.name}</span></div>
                <div>수량: <span class="log-qty">${log.qty}개</span></div>
                <div class="log-date">${log.date}</div>
              </div>
              <button class="log-del" onclick="deleteLog(${log.id})">삭제</button>
            </div>`;
          });
        }
      }
      document.getElementById('logs-content').innerHTML = html;
    }

    async function deleteLog(id) {
      if (!confirm('이 로그를 삭제할까요?')) return;
      const { error } = await sb.from('inventory_logs').delete().eq('id', id);
      if (error) return alert('삭제 오류: ' + error.message);
      await loadLogs();
      renderLogs();
    }

    async function clearLogs() {
      if (!confirm('로그 전체를 삭제할까요?')) return;
      const { error } = await sb.from('inventory_logs').delete().gte('id', 0);
      if (error) return alert('삭제 오류: ' + error.message);
      await loadLogs();
      renderLogs();
    }

    function doSearch() {
      const q = document.getElementById('search-input').value.toLowerCase();
      let html = '';
      ['A','B','C'].forEach(col => {
        for (let c = 1; c <= 20; c++) {
          if (inv[col][c]) {
            for (let f = 1; f <= 10; f++) {
              if (inv[col][c][f]) {
                inv[col][c][f].forEach((it, idx) => {
                  if (it.n.toLowerCase().includes(q)) {
                    html += `<div class="search-result-item" onclick="openEditModal('${col}',${c},${f},${idx})">${it.n}${it.d ? ' [' + it.d + ']' : ''}<br>${col}열 칸${c} ${f}층 | ${it.q}개</div>`;
                  }
                });
              }
            }
          }
        }
      });
      document.getElementById('search-results').innerHTML = html || '<div style="color:#999; font-size: 16px;">없음</div>';
    }

    async function resetData() {
      if (!confirm('초기화? (모든 데이터가 지워지고 초기 데이터로 교체됩니다)')) return;

      const { error: delItemsErr } = await sb.from('inventory_items').delete().gte('id', 0);
      if (delItemsErr) return alert('초기화 오류: ' + delItemsErr.message);
      const { error: delLogsErr } = await sb.from('inventory_logs').delete().gte('id', 0);
      if (delLogsErr) return alert('초기화 오류: ' + delLogsErr.message);

      const rows = flattenInitialData();
      if (rows.length) {
        const { error: insErr } = await sb.from('inventory_items').insert(rows);
        if (insErr) return alert('초기화 오류: ' + insErr.message);
      }

      await loadInventory();
      await loadLogs();
      render();
      alert('완료!');
    }

    async function seedInitialData() {
      const { count, error: countErr } = await sb.from('inventory_items').select('*', { count: 'exact', head: true });
      if (countErr) return alert('확인 오류: ' + countErr.message);

      if (count > 0) {
        if (!confirm(`이미 ${count}개의 데이터가 등록되어 있습니다. 그래도 초기 데이터를 추가하시겠습니까? (중복 등록됩니다)`)) return;
      } else {
        if (!confirm('초기 데이터를 Supabase에 등록하시겠습니까?')) return;
      }

      const rows = flattenInitialData();
      const { error } = await sb.from('inventory_items').insert(rows);
      if (error) return alert('등록 오류: ' + error.message);

      alert('초기 데이터가 등록되었습니다!');
      await loadInventory();
      render();
    }

    function downloadCSV() {
      let csv = '열,칸,층,상품명,수량,입고날짜,유통기한\n';
      ['A','B','C'].forEach(col => {
        for (let c = 1; c <= 20; c++) {
          if (inv[col][c]) {
            for (let f = 1; f <= 10; f++) {
              if (inv[col][c][f]) inv[col][c][f].forEach(it => csv += `${col},${c},${f},${it.n},${it.q},${it.d},${it.e || ''}\n`);
            }
          }
        }
      });
      const blob = new Blob([csv], {type: 'text/csv'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = '재고.csv';
      a.click();
    }

    function downloadInventoryExcel() {
      const rows = [['열', '칸', '층', '상품명', '수량', '입고일', '유통기한']];
      ['A', 'B', 'C'].forEach(col => {
        for (let c = 1; c <= 20; c++) {
          if (inv[col][c]) {
            for (let f = 1; f <= 10; f++) {
              if (inv[col][c][f]) inv[col][c][f].forEach(it => rows.push([col, c, f, it.n, it.q, it.d || '', it.e || '']));
            }
          }
        }
      });
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), '재고현황');
      XLSX.writeFile(wb, `재고현황_${getTodayDate()}.xlsx`);
    }

    function downloadLogsExcel() {
      const rows = [['구분', '열', '칸', '층', '상품명', '수량', '날짜']];
      logs.forEach(l => rows.push([l.type, l.col, l.can, l.floor, l.name, l.qty, l.date]));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), '입출고로그');
      XLSX.writeFile(wb, `입출고로그_${getTodayDate()}.xlsx`);
    }

    function downloadMonthlyStatsExcel() {
      const month = getSelectedMonth();
      const prod = getMonthlyProductStats(month);
      const rows = [['월', '상품명', '입고', '출고']];
      Object.entries(prod).forEach(([name, v]) => rows.push([month, name, v.in, v.out]));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), '월별통계');
      XLSX.writeFile(wb, `월별통계_${month}.xlsx`);
    }

    function downloadJSON() {
      const blob = new Blob([JSON.stringify({inv, logs},null,2)], {type: 'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = '재고.json';
      a.click();
    }

    function uploadJSON() { document.getElementById('file-input').click(); }

    function loadJSON(e) {
      const f = e.target.files[0];
      if (!f) return;
      const r = new FileReader();
      r.onload = async (ev) => {
        try {
          const d = JSON.parse(ev.target.result);
          if (!confirm('현재 Supabase 데이터를 모두 지우고 이 파일로 복원하시겠습니까?')) return;

          const { error: delItemsErr } = await sb.from('inventory_items').delete().gte('id', 0);
          if (delItemsErr) throw new Error(delItemsErr.message);
          const { error: delLogsErr } = await sb.from('inventory_logs').delete().gte('id', 0);
          if (delLogsErr) throw new Error(delLogsErr.message);

          const itemRows = [];
          Object.entries(d.inv || {}).forEach(([col, cans]) => {
            Object.entries(cans).forEach(([can, floors]) => {
              Object.entries(floors).forEach(([floor, items]) => {
                items.forEach(it => itemRows.push({ col, can: parseInt(can), floor: parseInt(floor), name: it.n, qty: it.q, in_date: it.d, exp_date: it.e || null }));
              });
            });
          });
          if (itemRows.length) {
            const { error } = await sb.from('inventory_items').insert(itemRows);
            if (error) throw new Error(error.message);
          }

          const logRows = (d.logs || []).map(l => ({ type: l.type, col: l.col, can: l.can, floor: l.floor, name: l.name, qty: l.qty, date: l.date }));
          if (logRows.length) {
            const { error } = await sb.from('inventory_logs').insert(logRows);
            if (error) throw new Error(error.message);
          }

          await loadInventory();
          await loadLogs();
          render();
          alert('복원!');
        } catch(err) { alert('오류: ' + err.message); }
      };
      r.readAsText(f);
    }

    (async function init() {
      await loadInventory();
      await loadLogs();
      render();
      subscribeRealtime();
    })();
  </script>
</body>
